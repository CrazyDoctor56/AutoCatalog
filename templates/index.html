<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCatalog — Найкращі авто з Європи</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Стилі тільки для головної сторінки */
        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url("/static/pic/banner_audi_golovna.jpg") no-repeat center/cover;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hero-content p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .hero-search {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">🚗 AutoCatalog</div>
    <div class="nav-links">
        <a href="/cars" data-lang="nav_cars">Авто</a>
        <a href="/favorites" data-lang="nav_favorites">Обране</a>
        <a href="/cart" data-lang="nav_cart">Кошик</a>
        <a href="/login" data-lang="nav_login">Увійти</a>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">UA 🇺🇦</option>
            <option value="en">EN 🇬🇧</option>
        </select>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1 data-lang="hero_title">Найкращі автомобілі з Європи</h1>
        <p data-lang="hero_subtitle">Знайди авто своєї мрії</p>
        <div class="hero-search">
            <input type="text" placeholder="Пошук авто..." class="search-input" id="searchInput" data-lang-placeholder="search_placeholder">
            <button class="btn btn-primary" onclick="goSearch()" data-lang="search_btn">Знайти</button>
        </div>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>
        <div class="footer-socials">
            <a href="https://t.me" target="_blank"><img src="/static/icons/telegram.svg"></a>
            <a href="https://instagram.com" target="_blank"><img src="/static/icons/instagram.svg"></a>
            <a href="https://viber.com" target="_blank"><img src="/static/icons/viber.svg"></a>
        </div>
        <div class="footer-bottom">
            <a href="/about" class="footer-link" data-lang="footer_about">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>
    </div>
</footer>

<script src="/static/js/lang.js"></script>
<script src="/static/js/script.js"></script>
</body>
</html>
