<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCatalog — Авто</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .gallery {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            width: 100%;
            max-height: 420px;
            aspect-ratio: 16/9;
        }
        .gallery-track {
            display: flex;
            transition: transform 0.4s ease;
            height: 100%; 
        }
        .gallery-track img {
            min-width: 100%;
            height: 100%;
            max-height: 420px;
            object-fit: cover;
            flex-shrink: 0; 
        }
        .gallery-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.55);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-btn:hover {
            background: rgba(0,255,153,0.7);
            color: #000; 
        }
        .gallery-btn.prev {
            left: 12px; 
        }
        .gallery-btn.next {
            right: 12px; 
        }
        .gallery-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
            z-index: 2;
        }
        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }
        .gallery-dot.active {
            background: var(--accent);
        }
        .gallery-thumbs {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .gallery-thumbs img {
            width: 80px;
            height: 55px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.55;
            transition: opacity 0.2s, outline 0.2s;
            flex-shrink: 0;
        }
        .gallery-thumbs img.active { 
            opacity: 1; 
            outline: 2px solid var(--accent); }

        .seller-block { 
            background: var(--bg-card); 
            border: 1px solid rgba(0,255,153,0.15); 
            border-radius: var(--radius); 
            padding: 16px 20px; 
            margin-top: 20px; 
        }
        .seller-label { 
            font-size: 12px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 6px; 
        }
        .seller-name { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 6px; 
        }
        .seller-phone { 
            display: inline-block; 
            color: var(--accent); 
            font-size: 18px; 
            font-weight: 600; 
        }
        .seller-phone:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-logo">🚗 AutoCatalog</div>
        <button class="burger" id="burgerBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
        <a href="/" data-lang="nav_home">Головна</a>
        <a href="/cars" data-lang="nav_cars">Авто</a>
        <a href="/favorites" data-lang="nav_favorites">Обране</a>
        <a href="/cart" data-lang="nav_cart">Кошик</a>
        {% if user %}
        <a href="/sell" style="color:var(--accent)">+ Продати</a>
        <a href="/my-cars">Мої авто</a>
        <span style="color:var(--accent);font-weight:500">{{ user.name }}</span>
        <a href="/logout" style="color:#aaa;font-size:13px">Вийти</a>
        {% else %}
        <a href="/login" data-lang="nav_login">Увійти</a>
        {% endif %}
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">🇺🇦 UA</option>
            <option value="en">🇬🇧 EN</option>
        </select>
    </div>
</nav>
<div class="container">
    <div class="car-detail">
        <div>
            <div class="gallery" id="gallery">
                <div class="gallery-track" id="galleryTrack"></div>
                <button class="gallery-btn prev" onclick="galleryMove(-1)">&#8249;</button>
                <button class="gallery-btn next" onclick="galleryMove(1)">&#8250;</button>
                <div class="gallery-dots" id="galleryDots"></div>
            </div>
            <div class="gallery-thumbs" id="galleryThumbs"></div>
        </div>
        <div class="car-detail-info">
            <h1 id="carName">Завантаження...</h1>
            <p class="price" id="carPrice"></p>
            <ul class="car-specs" id="carSpecs"></ul>
            <div class="car-actions">
                <button class="btn btn-primary" id="btnCart" data-lang="btn_cart">Додати в кошик</button>
                <button class="btn btn-outline" id="btnFav" data-lang="btn_fav">В обране</button>
            </div>
            <div id="sellerInfo"></div>
        </div>
    </div>
</div>
<footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>
        <div class="footer-socials">
            <a href="https://t.me" target="_blank"><img src="/static/icons/telegram.svg"></a>
            <a href="https://instagram.com" target="_blank"><img src="/static/icons/instagram.svg"></a>
            <a href="https://viber.com" target="_blank"><img src="/static/icons/viber.svg"></a>
        </div>
        <div class="footer-bottom">
            <a href="/about" class="footer-link" data-lang="footer_about">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>
    </div>
</footer>
<script src="/static/js/lang.js"></script>
<script src="/static/js/script.js"></script>
<script src="/static/js/car.js"></script>
<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("open");
    document.getElementById("burgerBtn").classList.toggle("open");
}
</script>
</body>
</html>
