<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCatalog — Кошик</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav>
    <div class="nav-logo">🚗 AutoCatalog</div>
    <div class="nav-links">
        <a href="/" data-lang="nav_home">Головна</a>
        <a href="/cars" data-lang="nav_cars">Авто</a>
        <a href="/favorites" data-lang="nav_favorites">Обране</a>
        <a href="/login" data-lang="nav_login">Увійти</a>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">🇺🇦 UA</option>
            <option value="en">🇬🇧 EN</option>
        </select>
    </div>
</nav>

<div class="container">
    <div class="page-title">
        <h1 data-lang="cart_title">Кошик</h1>
    </div>
    <div class="cart-list" id="cartList"></div>
    <div class="cart-total" id="cartTotal" style="display:none">
        <span data-lang="cart_total">Разом:</span>
        <strong id="cartTotalPrice" style="color:var(--accent)"></strong>
        <br><br>
        <button class="btn btn-primary" data-lang="cart_checkout">Оформити замовлення</button>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>
        <div class="footer-socials">
            <a href="https://t.me" target="_blank"><img src="/static/icons/telegram.svg"></a>
            <a href="https://instagram.com" target="_blank"><img src="/static/icons/instagram.svg"></a>
            <a href="https://viber.com" target="_blank"><img src="/static/icons/viber.svg"></a>
        </div>
        <div class="footer-bottom">
            <a href="/about" class="footer-link" data-lang="footer_about">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>
    </div>
</footer>

<script src="/static/js/lang.js"></script>
<script src="/static/js/script.js"></script>
<script src="/static/js/cart.js"></script>
</body>
</html>
