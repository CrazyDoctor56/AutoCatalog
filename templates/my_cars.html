<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCatalog — Мої оголошення</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .my-car-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            transition: var(--transition);
        }
        .my-car-item:hover {
            border-color: rgba(0,255,153,0.15);
        }
        .my-car-item img {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .my-car-item-info {
            flex: 1;
        }
        .my-car-item-info h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 4px;
        }
        .my-car-item-info p {
            color: var(--text-muted);
            font-size: 14px;
        }
        .my-car-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-logo">🚗 AutoCatalog</div>
    <div class="nav-links">
        <a href="/" data-lang="nav_home">Головна</a>
        <a href="/cars" data-lang="nav_cars">Авто</a>
        {% if user %}
        <a href="/sell" style="color:var(--accent)" data-lang="+sell">+ Продати авто</a>
        <span style="color:var(--accent);font-weight:500">{{ user.name }}</span>
        <a href="/logout" style="color:#aaa;font-size:13px" data-lang="exit">Вийти</a>
        {% else %}
        <a href="/login" data-lang="nav_login">Увійти</a>
        {% endif %}
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">🇺🇦 UA</option>
            <option value="en">🇬🇧 EN</option>
        </select>
    </div>
</nav>
<div class="container">
    <div class="page-title">
        <h1 data-lang="my_announcements">Мої оголошення</h1>
    </div>
    <div id="myCarsList">
        <p style="color:#aaa" data-lang="download">Завантаження...</p>
    </div>
</div>
<footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>
        <div class="footer-socials">
            <a href="https://t.me" target="_blank"><img src="/static/icons/telegram.svg"></a>
            <a href="https://instagram.com" target="_blank"><img src="/static/icons/instagram.svg"></a>
            <a href="https://viber.com" target="_blank"><img src="/static/icons/viber.svg"></a>
        </div>
        <div class="footer-bottom">
            <a href="/about" class="footer-link">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>
    </div>
</footer>
<script src="/static/js/lang.js"></script>
<script src="/static/js/script.js"></script>
<script src="/static/js/my_cars.js"></script>
</body>
</html>
