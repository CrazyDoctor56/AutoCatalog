<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCatalog — Авто</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <div class="nav-logo">🚗 AutoCatalog</div>
    <div class="nav-links">
        <a href="/" data-lang="nav_home">Головна</a>
        <a href="/favorites" data-lang="nav_favorites">Обране</a>
        <a href="/cart" data-lang="nav_cart">Кошик</a>
        {% if user %}
        <a href="/sell" style="color:var(--accent)" data-lang="+sell">+ Продати</a>
        <a href="/my-cars" data-lang="my_cars">Мої авто</a>
        <span style="color:var(--accent);font-weight:500">{{ user.name }}</span>
        <a href="/logout" style="color:#aaa;font-size:13px" data-lang="exit">Вийти</a>
        {% else %}
        <a href="/login" data-lang="nav_login">Увійти</a>
        {% endif %}
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">🇺🇦 UA</option>
            <option value="en">🇬🇧 EN</option>
        </select>
    </div>
</nav>
<div class="container">
    <div class="page-title">
        <h1 data-lang="cars_title">Топ автомобілів</h1>
    </div>
    <div class="top-bar">
        <button class="btn btn-primary" onclick="toggleFilters()" data-lang="filters_btn">Фільтри</button>
        <input type="text" class="search-input" id="searchInput" placeholder="Пошук авто..." data-lang-placeholder="search_placeholder">
    </div>
    <div id="filters" class="filters">
        <div class="filters-content">
            <input type="text" id="filterBrand" placeholder="Марка" data-lang-placeholder="filter_brand">
            <input type="text" id="filterYearFrom" placeholder="Рік від" data-lang-placeholder="filter_year_from">
            <input type="text" id="filterYearTo" placeholder="Рік до" data-lang-placeholder="filter_year_to">
            <input type="text" id="filterPriceFrom" placeholder="Ціна від ($)" data-lang-placeholder="filter_price_from">
            <input type="text" id="filterPriceTo" placeholder="Ціна до ($)" data-lang-placeholder="filter_price_to">
            <select id="filterFuel">
                <option value="" data-lang="filter_fuel_all">Паливо</option>
                <option value="бензин" data-lang="filter_fuel_petrol">Бензин</option>
                <option value="дизель" data-lang="filter_fuel_diesel">Дизель</option>
                <option value="електро" data-lang="filter_fuel_electric">Електро</option>
                <option value="гібрид">Гібрид</option>
            </select>
            <button class="btn btn-primary" onclick="applyFilters()" data-lang="search_btn">Пошук</button>
        </div>
    </div>
    <div class="cars-grid" id="carsGrid">
        <p style="color:#aaa" data-lang="download">Завантаження...</p>
    </div>
</div>
<footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>
        <div class="footer-socials">
            <a href="https://t.me" target="_blank"><img src="/static/icons/telegram.svg"></a>
            <a href="https://instagram.com" target="_blank"><img src="/static/icons/instagram.svg"></a>
            <a href="https://viber.com" target="_blank"><img src="/static/icons/viber.svg"></a>
        </div>
        <div class="footer-bottom">
            <a href="/about" class="footer-link" data-lang="footer_about">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>
    </div>
</footer>
<script src="/static/js/lang.js"></script>
<script src="/static/js/script.js"></script>
</body>
</html>
