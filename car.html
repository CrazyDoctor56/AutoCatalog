<style>

footer {

.footer-info {
    margin-bottom: 15px;
    color: #ccc;

.footer-socials {
    display: flex;
    justify-content: center;

.footer-socials img {

    height: 28px;
    filter: brightness(0) invert(1); /* робить іконки білими */

}

.footer-socials img:hover {
    transform: scale(1.2);
    filter: brightness(0) invert(0.6) sepia(1) hue-rotate(100deg);
}

.footer-bottom {

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

nav {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(5px);
}

.active:hover {
    color: #00ff99;
}

.footer-link {
    display: inline-block;
    margin-top: 5px;
    color: #aaa;

    transition: 0.3s;
}

.footer-link:hover {
    color: #00ff99;
}

nav div:last-child {
    display: flex;
    align-items: center;
    gap: 20px;
}

.lang-select {
    background: #222;
    color: white;
    border: 1px solid #333;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;

    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    transition: 0.2s;
}

.lang-select:hover {
    border-color: #00ff99;
}
