<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>AutoCatalog</title>
<style>

footer {
    background: #1a1a1a;
    padding: 30px 20px;
    margin-top: auto;
}

.footer-container {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
}

.footer-info {
    margin-bottom: 15px;
    color: #ccc;
}

.footer-socials {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
}

.footer-socials img {
    width: 28px;
    height: 28px;
    filter: brightness(0) invert(1);
    transition: 0.3s;
}

.footer-socials img:hover {
    transform: scale(1.2);
    filter: brightness(0) invert(0.6) sepia(1) hue-rotate(100deg);
}

.footer-bottom {
    font-size: 14px;
    color: #888;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #1a1a1a;
}    */

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("pic/banner_audi_golovna.jpg") no-repeat center/cover;
}

.hero h1 {
    font-size: 48px;
}
.hero button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #00ff99;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}
.hero button:hover {
    transform: scale(1.1);
}

.hero {
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0, 0, 0, 0.5);
}

.hero > div {
    position: relative;
    z-index: 1;
}

.search {
    margin-top: 20px;
    padding: 12px 20px;
    width: 300px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
}

.active:hover {
    color: #00ff99;
}

.lang-select {
    background: #222;
    color: white;
    border: 1px solid #333;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;

    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    transition: 0.2s;
}

.lang-select:hover {
    border-color: #00ff99;
}

nav div:last-child {
    display: flex;
    align-items: center;
    gap: 20px;
}

.footer-link {
    display: inline-block;
    margin-top: 5px;
    color: #aaa;
    text-decoration: none;
    transition: 0.3s;
}

.footer-link:hover {
    color: #00ff99;
}
</style>
</head>

<body>

<nav>
    <div>🚗 AutoCatalog</div>
    <div>
        <!-- <a href="#" class="active">Головна</a> -->
        <a href="cars.html" class="active">Авто</a>
        <a href="favorites.html" class="active">Обране</a>
        <a href="cart.html" class="active">Кошик</a>
        <a href="login.html" class="active">Увійти</a>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ua">UA</option>
            <option value="en">EN</option>
        </select>        
    </div>
</nav>

<div class="hero">
    <div>
        <h1>Найкращі автомобілі з Європи</h1>
        <input type="text" placeholder="Пошук авто..." class="search" id="searchInput">
    </div>
</div>

<footer>
    <div class="footer-container">

        <div class="footer-info">
            <p>+380 77 100 88 66</p>
            <p>autocatalog@gmail.com</p>
        </div>

        <div class="footer-socials">
            <a href="https://t.me" target="_blank">
                <img src="icons/telegram.svg">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="icons/instagram.svg">
            </a>
            <a href="https://viber.com" target="_blank">
                <img src="icons/viber.svg">
            </a>
        </div>

        <div class="footer-bottom">
            <a href="about.html" class="footer-link">Про нас</a>
            <p>© 2026 AutoCatalog</p>
        </div>

    </div>
</footer>
<script src="script.js"></script>
</body>
</html>
