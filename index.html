<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>AutoCatalog</title>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #1a1a1a;
}   

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

footer a {
    color: white;
    text-decoration: none;
    padding: 20px;
    transition: 0.3s;
}

.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url("pic/banner_audi_golovna.jpg") no-repeat center/cover;
}

.hero h1 {
    font-size: 48px;
}
.hero button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #00ff99;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}
.hero button:hover {
    transform: scale(1.1);
}

footer {
    text-align: center;
    padding: 20px;
    background: #1a1a1a;
}

.hero {
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0, 0, 0, 0.5);
}

.hero > div {
    position: relative;
    z-index: 1;
}

.search {
    margin-top: 20px;
    padding: 12px 20px;
    width: 300px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
}

nav {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(5px);
}

.active:hover {
    color: #00ff99;
}
    
</style>
</head>

<body>

<nav>
    <div>🚗 AutoCatalog</div>
    <div>
        <!-- <a href="#" class="active">Головна</a> -->
        <a href="cars.html" class="active">Авто</a>
        <a href="favorites.html" class="active">Обране</a>
        <a href="cart.html" class="active">Кошик</a>
        <a href="login.html" class="active">Увійти</a>
        
    </div>
</nav>

<div class="hero">
    <div>
        <h1>Найкращі автомобілі з Європи</h1>
        <input type="text" placeholder="Пошук авто..." class="search" id="searchInput">
    </div>
</div>

<footer>
    <p>+380 77 100 88 66</p>
    <p>autocatalog@gmail.com</p>
    <p>© 2026 AutoCatalog</p>
    <a href="about.html" class="active">Про нас</a>
</footer>
<script src="script.js"></script>
</body>
</html>
